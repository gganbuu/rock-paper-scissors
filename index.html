<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <h1>Welcome to gganbu's Rock-Paper-Scissors Game! </h1>
    <div id="scoreboard">
        <div class="scoreelement">
            <p class="playerscore">0</p>
            <i class="fa-solid fa-user"></i> 
            <p>You</p> 
        </div>
        <div class="scoreelement"><i id="playerchoice"></i></div>
        <div class="scoreelement"> 
            <p>—</p> 
        </div>
        <div class="scoreelement"><i id="computerchoice"></i></div>
        <div class="scoreelement">
            <p class="computerscore">0</p>
            <i class="fa-solid fa-computer"></i> 
            <p>Computer</p> 
        </div>
    </div>

    
    
    <div id="selectioncontainer">
        <button id="rockBtn">Rock</button>
        <button id="paperBtn">Paper</button>
        <button id="scissorsBtn">Scissors</button>
    </div>
    <br/>
    <br/>
    <div id="roundresult"></div>
</body>
</html>
